name: Symphony Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/symphony/**'
  workflow_dispatch:

concurrency:
  group: symphony-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if Symphony version changed
        id: check
        run: |
          CURRENT_VERSION=$(grep '^version' apps/symphony/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if git ls-remote --tags origin | grep -q "refs/tags/symphony-v$CURRENT_VERSION"; then
            echo "Tag symphony-v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New Symphony version $CURRENT_VERSION detected, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/symphony/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('apps/symphony/Cargo.lock') }}

      - name: Run tests
        run: cd apps/symphony && cargo test

      - name: Clippy
        run: cd apps/symphony && cargo clippy -- -D warnings

  build:
    needs: [check-version, test]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: symphony-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: symphony-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: symphony-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/symphony/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('apps/symphony/Cargo.lock') }}

      - name: Build release binary
        run: cd apps/symphony && cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp apps/symphony/target/${{ matrix.target }}/release/symphony ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy apps\symphony\target\${{ matrix.target }}\release\symphony.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Git tag
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          git tag "symphony-v$VERSION"
          git push origin "symphony-v$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          NOTES=$(sed -n "/^## ${VERSION}/,/^## /{ /^## ${VERSION}/d; /^## /d; p; }" apps/symphony/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "$NOTES" > /tmp/release-notes.md
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: symphony-v${{ needs.check-version.outputs.version }}
          name: Symphony v${{ needs.check-version.outputs.version }}
          files: |
            artifacts/symphony-linux-x86_64/symphony-linux-x86_64
            artifacts/symphony-macos-arm64/symphony-macos-arm64
            artifacts/symphony-windows-x86_64.exe/symphony-windows-x86_64.exe
          body_path: ${{ steps.changelog.outputs.found == 'true' && '/tmp/release-notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
