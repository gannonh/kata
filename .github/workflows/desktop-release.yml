name: Desktop Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if git ls-remote --tags origin | grep -q "refs/tags/desktop-v$CURRENT_VERSION"; then
            echo "Tag desktop-v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version $CURRENT_VERSION detected, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/symphony/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('apps/symphony/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Import Code Signing Certificate
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      - name: Bundle CLI runtime and Symphony binary
        env:
          CARGO_BUILD_TARGET: ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
        run: |
          cd apps/desktop && bun run bundle:cli

          # Replace host-arch Bun with correct target-arch Bun binary
          BUN_VERSION="bun-v1.3.8"
          BUN_ARCH="${{ matrix.arch == 'arm64' && 'aarch64' || 'x64' }}"
          BUN_DOWNLOAD="bun-darwin-${BUN_ARCH}"
          echo "Downloading Bun ${BUN_VERSION} for darwin-${BUN_ARCH}..."
          TEMP_DIR=$(mktemp -d)
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/${BUN_DOWNLOAD}.zip" -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip"
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/SHASUMS256.txt" -o "$TEMP_DIR/SHASUMS256.txt"
          cd "$TEMP_DIR" && grep "${BUN_DOWNLOAD}.zip" SHASUMS256.txt | shasum -a 256 -c - && cd -
          unzip -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip" -d "$TEMP_DIR"
          cp "$TEMP_DIR/${BUN_DOWNLOAD}/bun" vendor/bun/bun
          chmod +x vendor/bun/bun
          rm -rf "$TEMP_DIR"
          echo "Bun binary replaced with ${BUN_DOWNLOAD}"

          # Build Symphony for the target architecture
          # bundle-cli.sh may have built for host arch — rebuild with explicit target
          SYMPHONY_DIR="$(cd ../../apps/symphony && pwd)"
          TARGET="${CARGO_BUILD_TARGET}"
          echo "Building Symphony for $TARGET..."
          (cd "$SYMPHONY_DIR" && cargo build --release --target "$TARGET")

          BUILT_BIN="$SYMPHONY_DIR/target/$TARGET/release/symphony"
          if [ -f "$BUILT_BIN" ]; then
            cp "$BUILT_BIN" vendor/symphony
            chmod +x vendor/symphony
            echo "Symphony binary staged for $TARGET"
          else
            echo "::error::Symphony binary not found at $BUILT_BIN"
            exit 1
          fi

      - name: Build Desktop app
        run: cd apps/desktop && bun run build

      - name: Package for macOS ${{ matrix.arch }}
        run: |
          cd apps/desktop
          bunx electron-builder --config electron-builder.yml --mac dmg --${{ matrix.arch }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e

          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::Notarization credentials not configured. APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID secrets are required."
            exit 1
          fi

          cd apps/desktop/release

          APP_PATH=$(find . -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find mac* -name "*.app" -type d 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in release directory."
            exit 1
          fi

          echo "Found app bundle: $APP_PATH"

          ZIP_PATH="notarize-$(basename "$APP_PATH" .app).zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          echo "Submitting for notarization..."
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_PATH"
          rm "$ZIP_PATH"

          # Create distribution ZIP from notarized+stapled app
          DIST_ZIP="Kata-Desktop-${{ matrix.arch }}.zip"
          rm -f "$DIST_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$DIST_ZIP"

          # Rebuild DMG with the notarized app using hdiutil directly.
          # The electron-builder DMG contains the pre-notarization app,
          # so we replace it with a fresh one from the stapled .app.
          DMG_PATH="Kata-Desktop-${{ matrix.arch }}.dmg"
          rm -f "$DMG_PATH"

          STAGING_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          hdiutil create "$DMG_PATH" \
            -volname "Kata Desktop" \
            -srcfolder "$STAGING_DIR" \
            -format UDZO \
            -fs HFS+
          rm -rf "$STAGING_DIR"

          echo "Verifying notarization..."
          spctl -a -v "$APP_PATH" 2>&1 || true
          echo "Notarization complete"

      - name: Verify macOS artifacts
        run: |
          set -e
          echo "Checking for macOS ${{ matrix.arch }} artifacts..."
          ls -la apps/desktop/release/
          if [ ! -f "apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.dmg" ]; then
            echo "::error::DMG file for ${{ matrix.arch }} not found"
            exit 1
          fi
          if [ ! -f "apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.zip" ]; then
            echo "::error::ZIP file for ${{ matrix.arch }} not found"
            exit 1
          fi
          echo "Found notarized artifacts for ${{ matrix.arch }}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-${{ matrix.arch }}
          path: |
            apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.dmg
            apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.zip
            apps/desktop/release/latest-mac.yml

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    strategy:
      matrix:
        # Bun does not publish Windows arm64 binaries, so only x64 is supported
        arch: [x64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc' || 'x86_64-pc-windows-msvc' }}

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/symphony/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('apps/symphony/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Bundle CLI runtime and Bun binary
        shell: bash
        run: |
          cd apps/desktop && bun run bundle:cli

          # Replace host-arch Bun with correct target-arch Bun binary
          BUN_VERSION="bun-v1.3.8"
          BUN_ARCH="${{ matrix.arch == 'arm64' && 'aarch64' || 'x64' }}"
          BUN_DOWNLOAD="bun-windows-${BUN_ARCH}"
          echo "Downloading Bun ${BUN_VERSION} for windows-${BUN_ARCH}..."
          TEMP_DIR=$(mktemp -d)
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/${BUN_DOWNLOAD}.zip" -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip"
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/SHASUMS256.txt" -o "$TEMP_DIR/SHASUMS256.txt"
          cd "$TEMP_DIR" && grep "${BUN_DOWNLOAD}.zip" SHASUMS256.txt | sha256sum -c - && cd -
          unzip -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip" -d "$TEMP_DIR"
          # Windows Bun zip contains bun.exe
          cp "$TEMP_DIR/${BUN_DOWNLOAD}/bun.exe" vendor/bun/bun.exe
          rm -f vendor/bun/bun
          rm -rf "$TEMP_DIR"
          echo "Bun binary replaced with ${BUN_DOWNLOAD}"

          # Create Windows launcher script (kata.cmd)
          printf '@echo off\r\nset "SCRIPT_DIR=%%~dp0"\r\n"%%SCRIPT_DIR%%bun\\bun.exe" "%%SCRIPT_DIR%%kata-runtime\\dist\\loader.js" %%*\r\n' > vendor/kata.cmd

      - name: Build Symphony for Windows ${{ matrix.arch }}
        shell: bash
        run: |
          TARGET="${{ matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc' || 'x86_64-pc-windows-msvc' }}"
          echo "Building Symphony for $TARGET..."
          cd apps/symphony && cargo build --release --target "$TARGET"

          BUILT_BIN="target/$TARGET/release/symphony.exe"
          if [ -f "$BUILT_BIN" ]; then
            cp "$BUILT_BIN" ../desktop/vendor/symphony.exe
            echo "Symphony binary staged for $TARGET"
          else
            echo "::error::Symphony binary not found at $BUILT_BIN"
            exit 1
          fi

      - name: Build Desktop app
        run: cd apps/desktop && bun run build

      - name: Package for Windows ${{ matrix.arch }}
        shell: bash
        run: |
          cd apps/desktop
          npx electron-builder --config electron-builder.yml --win nsis --${{ matrix.arch }}

      - name: Verify Windows artifacts
        shell: bash
        run: |
          set -e
          echo "Checking for Windows ${{ matrix.arch }} artifacts..."
          ls -la apps/desktop/release/
          if ! ls apps/desktop/release/Kata-Desktop-${{ matrix.arch }}-Setup.exe 1>/dev/null 2>&1; then
            echo "::error::NSIS installer for ${{ matrix.arch }} not found"
            exit 1
          fi
          echo "Found Windows artifacts for ${{ matrix.arch }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-${{ matrix.arch }}
          path: |
            apps/desktop/release/Kata-Desktop-${{ matrix.arch }}-Setup.exe
            apps/desktop/release/latest.yml

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}

      - name: Install cross-compilation tools
        if: matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          # Pin existing Ubuntu sources to amd64 only, then add arm64 from ports.
          # Ubuntu 24.04 runners use DEB822 .sources format — only modify that file,
          # leave third-party .list files (e.g. microsoft-prod.list) untouched.
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/^Architectures:.*/Architectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          fi
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ noble main restricted universe multiverse\ndeb [arch=arm64] http://ports.ubuntu.com/ noble-updates main restricted universe multiverse\n' | sudo tee /etc/apt/sources.list.d/arm64-cross.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev:arm64 pkg-config

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/symphony/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('apps/symphony/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Bundle CLI runtime and Bun binary
        run: |
          cd apps/desktop && bun run bundle:cli

          # Replace host-arch Bun with correct target-arch Bun binary
          BUN_VERSION="bun-v1.3.8"
          BUN_ARCH="${{ matrix.arch == 'arm64' && 'aarch64' || 'x64' }}"
          BUN_DOWNLOAD="bun-linux-${BUN_ARCH}"
          echo "Downloading Bun ${BUN_VERSION} for linux-${BUN_ARCH}..."
          TEMP_DIR=$(mktemp -d)
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/${BUN_DOWNLOAD}.zip" -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip"
          curl -fSL "https://github.com/oven-sh/bun/releases/download/${BUN_VERSION}/SHASUMS256.txt" -o "$TEMP_DIR/SHASUMS256.txt"
          cd "$TEMP_DIR" && grep "${BUN_DOWNLOAD}.zip" SHASUMS256.txt | sha256sum -c - && cd -
          unzip -o "$TEMP_DIR/${BUN_DOWNLOAD}.zip" -d "$TEMP_DIR"
          cp "$TEMP_DIR/${BUN_DOWNLOAD}/bun" vendor/bun/bun
          chmod +x vendor/bun/bun
          rm -rf "$TEMP_DIR"
          echo "Bun binary replaced with ${BUN_DOWNLOAD}"

      - name: Build Symphony for Linux ${{ matrix.arch }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: '1'
          PKG_CONFIG_PATH: ${{ matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
          OPENSSL_DIR: ${{ matrix.arch == 'arm64' && '/usr' || '' }}
          OPENSSL_INCLUDE_DIR: ${{ matrix.arch == 'arm64' && '/usr/include/aarch64-linux-gnu' || '' }}
          OPENSSL_LIB_DIR: ${{ matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu' || '' }}
        run: |
          TARGET="${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}"
          echo "Building Symphony for $TARGET..."
          cd apps/symphony && cargo build --release --target "$TARGET"

          BUILT_BIN="target/$TARGET/release/symphony"
          if [ -f "$BUILT_BIN" ]; then
            cp "$BUILT_BIN" ../desktop/vendor/symphony
            chmod +x ../desktop/vendor/symphony
            echo "Symphony binary staged for $TARGET"
          else
            echo "::error::Symphony binary not found at $BUILT_BIN"
            exit 1
          fi

      - name: Build Desktop app
        run: cd apps/desktop && bun run build

      - name: Package for Linux ${{ matrix.arch }}
        run: |
          cd apps/desktop
          npx electron-builder --config electron-builder.yml --linux AppImage deb --${{ matrix.arch }}

      - name: Verify Linux artifacts
        run: |
          set -e
          echo "Checking for Linux ${{ matrix.arch }} artifacts..."
          ls -la apps/desktop/release/
          if ! ls apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.AppImage 1>/dev/null 2>&1; then
            echo "::error::AppImage for ${{ matrix.arch }} not found"
            exit 1
          fi
          if ! ls apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.deb 1>/dev/null 2>&1; then
            echo "::error::deb package for ${{ matrix.arch }} not found"
            exit 1
          fi
          echo "Found Linux artifacts for ${{ matrix.arch }}"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: linux-${{ matrix.arch }}
          path: |
            apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.AppImage
            apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.deb
            apps/desktop/release/latest-linux.yml

  release:
    needs: [check-version, build-macos, build-windows, build-linux]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          # macOS
          cp artifacts/macos-arm64/*.dmg release-files/
          cp artifacts/macos-arm64/*.zip release-files/
          cp artifacts/macos-x64/*.dmg release-files/
          cp artifacts/macos-x64/*.zip release-files/
          cp artifacts/macos-arm64/latest-mac.yml release-files/ 2>/dev/null || true
          # Windows (x64 only — Bun does not publish Windows arm64 binaries)
          cp artifacts/windows-x64/*.exe release-files/
          cp artifacts/windows-x64/latest.yml release-files/latest.yml 2>/dev/null || true
          # Linux
          cp artifacts/linux-x64/*.AppImage release-files/
          cp artifacts/linux-x64/*.deb release-files/
          cp artifacts/linux-arm64/*.AppImage release-files/
          cp artifacts/linux-arm64/*.deb release-files/
          cp artifacts/linux-x64/latest-linux.yml release-files/latest-linux.yml 2>/dev/null || true
          cp artifacts/linux-arm64/latest-linux.yml release-files/latest-linux-arm64.yml 2>/dev/null || true
          echo "Files to be released:"
          ls -la release-files/

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          NOTES=$(sed -n "/^## ${VERSION}/,/^## /{ /^## ${VERSION}/d; /^## /d; p; }" apps/desktop/CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "$NOTES" > /tmp/release-notes.md
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: desktop-v${{ needs.check-version.outputs.version }}
          name: Kata Desktop v${{ needs.check-version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.found == 'true' && '/tmp/release-notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          make_latest: true
          files: release-files/*
