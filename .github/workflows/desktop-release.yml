name: Desktop Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if git ls-remote --tags origin | grep -q "refs/tags/desktop-v$CURRENT_VERSION"; then
            echo "Tag desktop-v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version $CURRENT_VERSION detected, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/symphony/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('apps/symphony/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Import Code Signing Certificate
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      - name: Bundle CLI runtime and Symphony binary
        env:
          CARGO_BUILD_TARGET: ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
        run: |
          cd apps/desktop && bun run bundle:cli

          # Override the Symphony binary with the correct cross-compiled target
          SYMPHONY_DIR="$(cd ../../apps/symphony && pwd)"
          TARGET="${CARGO_BUILD_TARGET}"
          BUILT_BIN="$SYMPHONY_DIR/target/$TARGET/release/symphony"

          if [ ! -f "$BUILT_BIN" ]; then
            echo "Cross-compiling Symphony for $TARGET..."
            (cd "$SYMPHONY_DIR" && cargo build --release --target "$TARGET")
          fi

          if [ -f "$BUILT_BIN" ]; then
            cp "$BUILT_BIN" vendor/symphony
            chmod +x vendor/symphony
            echo "Symphony binary staged for $TARGET"
          else
            echo "::warning::Symphony binary not found for $TARGET"
          fi

      - name: Build Desktop app
        run: cd apps/desktop && bun run build

      - name: Prepare builder app
        run: cd apps/desktop && bun run prepare:builder-app

      - name: Package for macOS ${{ matrix.arch }}
        run: |
          cd apps/desktop
          APP_VERSION="$(node -p "require('./package.json').version")"
          ELECTRON_VERSION="$(node -p "const v=require('./package.json').devDependencies?.electron ?? ''; v.replace(/^[^0-9]*/, '').replace(/[^0-9.].*$/, '')")"

          bunx electron-packager \
            .bundle-app \
            "Kata Desktop" \
            --platform=darwin \
            --arch=${{ matrix.arch }} \
            --out=release \
            --overwrite \
            --icon=resources/AppIcon.icns \
            --app-version="$APP_VERSION" \
            --electron-version="$ELECTRON_VERSION"

          APP_DIR="release/Kata Desktop-darwin-${{ matrix.arch }}/Kata Desktop.app"
          RESOURCES_DIR="$APP_DIR/Contents/Resources"

          cp vendor/kata "$RESOURCES_DIR/kata"
          cp -R vendor/kata-runtime "$RESOURCES_DIR/kata-runtime"
          cp -R vendor/bun "$RESOURCES_DIR/bun"
          chmod +x "$RESOURCES_DIR/kata" "$RESOURCES_DIR/bun/bun"

          bunx electron-builder --config electron-builder.yml --prepackaged "$APP_DIR" --mac dmg
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e

          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::Notarization credentials not configured. APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID secrets are required."
            exit 1
          fi

          cd apps/desktop/release

          APP_PATH=$(find . -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find mac* -name "*.app" -type d 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in release directory."
            exit 1
          fi

          echo "Found app bundle: $APP_PATH"

          ZIP_PATH="notarize-$(basename "$APP_PATH" .app).zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          echo "Submitting for notarization..."
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_PATH"
          rm "$ZIP_PATH"

          DIST_ZIP="Kata-Desktop-${{ matrix.arch }}.zip"
          rm -f "$DIST_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$DIST_ZIP"

          DMG_PATH="Kata-Desktop-${{ matrix.arch }}.dmg"
          if [ -f "$DMG_PATH" ]; then
            echo "Rebuilding DMG with notarized app..."
            MOUNT_DIR=$(mktemp -d)
            hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -quiet

            TEMP_DMG="temp-${{ matrix.arch }}.dmg"
            hdiutil create -size 500m -fs HFS+ -volname "Kata Desktop" "$TEMP_DMG"
            TEMP_MOUNT=$(mktemp -d)
            hdiutil attach "$TEMP_DMG" -mountpoint "$TEMP_MOUNT" -nobrowse -quiet

            cp -R "$MOUNT_DIR"/* "$TEMP_MOUNT"/ 2>/dev/null || true
            rm -rf "$TEMP_MOUNT"/*.app
            cp -R "$APP_PATH" "$TEMP_MOUNT"/

            if [ ! -e "$TEMP_MOUNT/Applications" ]; then
              ln -s /Applications "$TEMP_MOUNT/Applications"
            fi

            hdiutil detach "$MOUNT_DIR" -quiet
            hdiutil detach "$TEMP_MOUNT" -quiet

            rm "$DMG_PATH"
            hdiutil convert "$TEMP_DMG" -format UDZO -o "$DMG_PATH"
            rm "$TEMP_DMG"
          fi

          echo "Verifying notarization..."
          if ! spctl -a -v "$APP_PATH" 2>&1 | grep -q "accepted"; then
            echo "::error::App failed notarization verification"
            spctl -a -v "$APP_PATH"
            exit 1
          fi
          echo "Notarization verified successfully!"

      - name: Verify macOS artifacts
        run: |
          set -e
          echo "Checking for macOS ${{ matrix.arch }} artifacts..."
          ls -la apps/desktop/release/
          if [ ! -f "apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.dmg" ]; then
            echo "::error::DMG file for ${{ matrix.arch }} not found"
            exit 1
          fi
          if [ ! -f "apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.zip" ]; then
            echo "::error::ZIP file for ${{ matrix.arch }} not found"
            exit 1
          fi
          echo "Found notarized artifacts for ${{ matrix.arch }}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-${{ matrix.arch }}
          path: |
            apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.dmg
            apps/desktop/release/Kata-Desktop-${{ matrix.arch }}.zip
            apps/desktop/release/latest-mac.yml

  release:
    needs: [check-version, build-macos]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp artifacts/macos-arm64/*.dmg release-files/
          cp artifacts/macos-arm64/*.zip release-files/
          cp artifacts/macos-x64/*.dmg release-files/
          cp artifacts/macos-x64/*.zip release-files/
          cp artifacts/macos-arm64/latest-mac.yml release-files/ 2>/dev/null || true
          echo "Files to be released:"
          ls -la release-files/

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          NOTES=$(sed -n "/^## ${VERSION}/,/^## /{ /^## ${VERSION}/d; /^## /d; p; }" apps/desktop/CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "$NOTES" > /tmp/release-notes.md
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: desktop-v${{ needs.check-version.outputs.version }}
          name: Kata Desktop v${{ needs.check-version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.found == 'true' && '/tmp/release-notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          make_latest: true
          files: release-files/*
