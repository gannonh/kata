name: Context Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/context/**'

concurrency:
  group: context-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check if Context version changed
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/context/package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if git ls-remote --tags origin | grep -q "refs/tags/context-v$CURRENT_VERSION"; then
            echo "Tag context-v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New Context version $CURRENT_VERSION detected, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: cd apps/context && npx tsc --noEmit

      - name: Run tests
        run: cd apps/context && bun test test/

  publish:
    needs: [check-version, test]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: cd apps/context && npx tsc

      - name: Publish to npm
        run: cd apps/context && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          git tag "context-v$VERSION"
          git push origin "context-v$VERSION"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          CHANGELOG="apps/context/CHANGELOG.md"
          if [ ! -f "$CHANGELOG" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          NOTES=$(sed -n "/^## ${VERSION}/,/^## /{ /^## ${VERSION}/d; /^## /d; p; }" "$CHANGELOG")
          if [ -z "$NOTES" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "$NOTES" > /tmp/release-notes.md
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: context-v${{ needs.check-version.outputs.version }}
          name: Kata Context v${{ needs.check-version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.found == 'true' && '/tmp/release-notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          make_latest: false
