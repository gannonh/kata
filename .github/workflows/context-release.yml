name: Context Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/context/**'

concurrency:
  group: context-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check if Context version changed
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/context/package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if git ls-remote --tags origin | grep -q "refs/tags/context-v$CURRENT_VERSION"; then
            echo "Tag context-v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New Context version $CURRENT_VERSION detected, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: cd apps/context && npx tsc --noEmit

      - name: Run tests
        run: cd apps/context && bun test test/

  publish:
    needs: [check-version, test]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: cd apps/context && npx tsc

      - name: Publish to npm
        run: cd apps/context && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          git tag "context-v$VERSION"
          git push origin "context-v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: context-v${{ needs.check-version.outputs.version }}
          name: Kata Context v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          make_latest: false
