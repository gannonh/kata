name: Pi Symphony Extension Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/symphony/pi-extension/**'
      - '.github/workflows/pi-symphony-extension-release.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: pi-symphony-extension-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      npm_tag: ${{ steps.check.outputs.npm_tag }}
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check if Pi Symphony extension version changed
        id: check
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(node -p "require('./apps/symphony/pi-extension/package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if [[ "$CURRENT_VERSION" == *-* ]]; then
            DIST_TAG="${CURRENT_VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
            echo "npm_tag=$DIST_TAG" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

          TAG_EXISTS=false
          NPM_EXISTS=false

          if git ls-remote --exit-code --tags --refs origin "refs/tags/pi-symphony-v$CURRENT_VERSION" >/dev/null 2>&1; then
            TAG_EXISTS=true
          fi

          if npm view "@kata-sh/pi-symphony-extension@$CURRENT_VERSION" version >/dev/null 2>&1; then
            NPM_EXISTS=true
          fi

          if [[ "$TAG_EXISTS" == "true" && "$NPM_EXISTS" == "true" ]]; then
            echo "Pi Symphony extension $CURRENT_VERSION is already released, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          elif [[ "$TAG_EXISTS" != "$NPM_EXISTS" ]]; then
            echo "::error::Partial Pi Symphony extension release detected for $CURRENT_VERSION. tag_exists=$TAG_EXISTS npm_exists=$NPM_EXISTS"
            exit 1
          else
            echo "New Pi Symphony extension version $CURRENT_VERSION detected, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --dir apps/symphony/pi-extension run lint

      - name: TypeScript check
        run: pnpm --dir apps/symphony/pi-extension run typecheck

      - name: Run tests
        run: pnpm --dir apps/symphony/pi-extension run test

      - name: Pack dry-run
        working-directory: apps/symphony/pi-extension
        run: npm pack --dry-run

  publish:
    needs: [check-version, test]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack dry-run
        working-directory: apps/symphony/pi-extension
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: apps/symphony/pi-extension
        run: npm publish --access public --tag "${{ needs.check-version.outputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          git tag "pi-symphony-v$VERSION"
          git push origin "pi-symphony-v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: pi-symphony-v${{ needs.check-version.outputs.version }}
          name: Pi Symphony Extension v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          make_latest: false
          prerelease: ${{ needs.check-version.outputs.prerelease == 'true' }}
