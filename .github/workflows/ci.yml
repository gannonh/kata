name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch main branch for --affected comparison
        run: git fetch origin main:main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/symphony/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/symphony/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native addons
        run: pnpm --dir apps/context rebuild better-sqlite3 tree-sitter

      - name: Run Turborepo validation
        run: pnpm exec turbo run lint typecheck test --affected

  symphony-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo + llvm-cov
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-llvm-cov
            apps/symphony/target
          key: ${{ runner.os }}-symphony-coverage-${{ hashFiles('apps/symphony/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-symphony-coverage-

      - name: Install cargo-llvm-cov
        run: |
          if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Run coverage gate and generate HTML report
        working-directory: apps/symphony
        run: cargo llvm-cov --html --output-dir coverage --fail-under-lines 72 --ignore-filename-regex 'main\.rs'

      - name: Add coverage summary to job summary
        if: always()
        working-directory: apps/symphony
        run: |
          {
            echo '## Symphony Coverage Summary'
            echo
            echo '```text'
            cargo llvm-cov report --summary-only --ignore-filename-regex 'main\.rs'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: symphony-coverage-report
          path: apps/symphony/coverage/
          retention-days: 30

  # Legacy desktop e2e-mocked job removed — apps/desktop is the only active desktop target.
  # Desktop unit tests run via Turborepo in the validate job (npx vitest run --coverage).
  # Desktop e2e tests will be added in a future milestone.

  gate:
    needs: [validate, symphony-coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "validate: ${{ needs.validate.result }}"
          echo "symphony-coverage: ${{ needs.symphony-coverage.result }}"

          if [[ "${{ needs.validate.result }}" == "failure" || \
                "${{ needs.symphony-coverage.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi

          echo "All jobs passed or were skipped"
