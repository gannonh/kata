name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Always runs: typechecks, lints, and unit tests for packages + desktop
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Cache Bun dependencies
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Run validate gate
        run: bun run validate:ci

  # CLI: typecheck + tests, always runs
  validate-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: cd apps/cli && npx tsc

      - name: Run CLI tests
        run: cd apps/cli && npm test

  # Orchestrator dry-run: runs when the current orchestrator version has not yet been tagged/released
  orc-publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Check if orchestrator version bumped
        id: version-check
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/orchestrator/package.json').version")
          if git ls-remote --tags origin "refs/tags/orc-v$CURRENT_VERSION" | grep -q .; then
            echo "Version $CURRENT_VERSION already tagged, skipping dry-run"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "New orchestrator version $CURRENT_VERSION detected, running publish dry-run"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.version-check.outputs.should_run == 'true'
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Publish dry-run
        if: steps.version-check.outputs.should_run == 'true'
        run: cd apps/orchestrator && npm publish --dry-run --access public

  # Desktop E2E: only on release PRs (version bump in apps/electron/package.json)
  e2e-mocked:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check if desktop version bumped
        id: version-check
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/electron/package.json').version")
          if git ls-remote --tags origin | grep -q "refs/tags/desktop-v$CURRENT_VERSION"; then
            echo "Version $CURRENT_VERSION already tagged, skipping E2E"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "New version $CURRENT_VERSION detected, running E2E"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        if: steps.version-check.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup Node.js
        if: steps.version-check.outputs.should_run == 'true'
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Cache Bun dependencies
        if: steps.version-check.outputs.should_run == 'true'
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        if: steps.version-check.outputs.should_run == 'true'
        run: bun install

      - name: Install Playwright browsers
        if: steps.version-check.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build Electron app
        if: steps.version-check.outputs.should_run == 'true'
        run: bun run electron:build

      - name: Run mocked E2E tests
        if: steps.version-check.outputs.should_run == 'true'
        run: xvfb-run --auto-servernum -- bun run test:e2e
        env:
          CI: 'true'
          KATA_TEST_MODE: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        if: failure()
        with:
          name: playwright-report
          path: apps/electron/playwright-report/
          retention-days: 7
