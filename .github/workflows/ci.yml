name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch main branch for --affected comparison
        run: git fetch origin main:main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/symphony/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/symphony/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: bun install

      - name: Rebuild native addons
        run: cd apps/context && npm rebuild better-sqlite3 tree-sitter

      - name: Run Turborepo validation
        run: bunx turbo run lint typecheck test --affected

  symphony-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo + llvm-cov
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-llvm-cov
            apps/symphony/target
          key: ${{ runner.os }}-symphony-coverage-${{ hashFiles('apps/symphony/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-symphony-coverage-

      - name: Install cargo-llvm-cov
        run: |
          if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Run coverage gate and generate HTML report
        working-directory: apps/symphony
        run: cargo llvm-cov --html --output-dir coverage --fail-under-lines 80 --ignore-filename-regex 'main\.rs'

      - name: Add coverage summary to job summary
        working-directory: apps/symphony
        run: |
          {
            echo '## Symphony Coverage Summary'
            echo
            echo '```text'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: symphony-coverage-report
          path: apps/symphony/coverage/
          retention-days: 30

  e2e-mocked:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if desktop version bumped
        id: version-check
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/electron/package.json').version")
          if git ls-remote --tags origin | grep -q "refs/tags/desktop-v$CURRENT_VERSION"; then
            echo "Version $CURRENT_VERSION already tagged, skipping E2E"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "New version $CURRENT_VERSION detected, running E2E"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        if: steps.version-check.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup Node.js
        if: steps.version-check.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.version-check.outputs.should_run == 'true'
        run: bun install

      - name: Install Playwright browsers
        if: steps.version-check.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build Electron app
        if: steps.version-check.outputs.should_run == 'true'
        run: bun run electron:build

      - name: Run mocked E2E tests
        if: steps.version-check.outputs.should_run == 'true'
        run: xvfb-run --auto-servernum -- bun run test:e2e
        env:
          CI: 'true'
          KATA_TEST_MODE: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/electron/playwright-report/
          retention-days: 7

  gate:
    needs: [validate, symphony-coverage, e2e-mocked]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "validate: ${{ needs.validate.result }}"
          echo "symphony-coverage: ${{ needs.symphony-coverage.result }}"
          echo "e2e-mocked: ${{ needs.e2e-mocked.result }}"

          if [[ "${{ needs.validate.result }}" == "failure" || \
                "${{ needs.symphony-coverage.result }}" == "failure" || \
                "${{ needs.e2e-mocked.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi

          echo "All jobs passed or were skipped"
