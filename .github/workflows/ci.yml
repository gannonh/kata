name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch main branch for --affected comparison
        run: git fetch origin main:main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/symphony/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/symphony/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: bun install

      - name: Rebuild native addons
        run: cd apps/context && npm rebuild better-sqlite3 tree-sitter

      - name: Run Turborepo validation
        run: bunx turbo run lint typecheck test --affected

  e2e-mocked:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if desktop version bumped
        id: version-check
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/electron/package.json').version")
          if git ls-remote --tags origin | grep -q "refs/tags/desktop-v$CURRENT_VERSION"; then
            echo "Version $CURRENT_VERSION already tagged, skipping E2E"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "New version $CURRENT_VERSION detected, running E2E"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        if: steps.version-check.outputs.should_run == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup Node.js
        if: steps.version-check.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.version-check.outputs.should_run == 'true'
        run: bun install

      - name: Install Playwright browsers
        if: steps.version-check.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build Electron app
        if: steps.version-check.outputs.should_run == 'true'
        run: bun run electron:build

      - name: Run mocked E2E tests
        if: steps.version-check.outputs.should_run == 'true'
        run: xvfb-run --auto-servernum -- bun run test:e2e
        env:
          CI: 'true'
          KATA_TEST_MODE: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/electron/playwright-report/
          retention-days: 7

  gate:
    needs: [validate, e2e-mocked]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "validate: ${{ needs.validate.result }}"
          echo "e2e-mocked: ${{ needs.e2e-mocked.result }}"

          if [[ "${{ needs.validate.result }}" == "failure" || \
                "${{ needs.e2e-mocked.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi

          echo "All jobs passed or were skipped"
