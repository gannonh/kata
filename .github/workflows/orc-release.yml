name: Orchestrator Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/orchestrator/**'
  workflow_dispatch:

concurrency:
  group: orc-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/orchestrator/package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if git ls-remote --tags origin | grep -q "refs/tags/orc-v$CURRENT_VERSION"; then
            echo "Tag orc-v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New orchestrator version $CURRENT_VERSION detected, will release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'

      - name: Run tests
        run: cd apps/orchestrator && npm test

  publish:
    needs: [check-version, test]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: '1.3.8'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build skill and plugin artifacts
        run: pnpm --dir apps/orchestrator run build:skills

      - name: Publish to npm
        run: cd apps/orchestrator && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload generated skill bundle
        uses: actions/upload-artifact@v7
        with:
          name: kata-skill-bundle
          path: apps/orchestrator/dist/skills/

      - name: Create Git tag
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          git tag "orc-v$VERSION"
          git push origin "orc-v$VERSION"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          NOTES=$(sed -n "/^## ${VERSION}/,/^## /{ /^## ${VERSION}/d; /^## /d; p; }" apps/orchestrator/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "$NOTES" > /tmp/release-notes.md
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: orc-v${{ needs.check-version.outputs.version }}
          name: Kata Orchestrator v${{ needs.check-version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.found == 'true' && '/tmp/release-notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          make_latest: false
