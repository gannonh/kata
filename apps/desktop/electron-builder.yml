appId: sh.kata.desktop
productName: Kata Desktop
copyright: Copyright © 2026 Kata Contributors

beforeBuild: scripts/beforeBuild.cjs
afterPack: scripts/afterPack.cjs
afterSign: scripts/afterSign.cjs

# Runtime resources are copied by afterPack:
# - pi / pi.cmd
# - kata-cli/
# - kata-skills/
# - symphony / symphony.exe

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - "!dist/renderer/src/**"
  - "!**/*.map"
  - "!**/*.test.*"
  - "!**/__tests__/**"
  - "!**/*.sh"
  - "!**/scripts/**"
  - "!node_modules"
  - package.json

extraMetadata:
  main: dist/main.cjs

publish: null

mac:
  category: public.app-category.developer-tools
  icon: resources/AppIcon.icns
  extendInfo:
    CFBundleIconName: AppIcon
  target:
    - dmg

dmg:
  artifactName: "Kata-Desktop-${arch}.${ext}"
  icon: resources/AppIcon.icns
  title: Kata Desktop
  contents:
    - x: 130
      y: 200
    - x: 410
      y: 200
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  artifactName: "Kata-Desktop-${arch}-Setup.${ext}"
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

linux:
  icon: resources/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64

appImage:
  artifactName: "Kata-Desktop-${arch}.${ext}"

deb:
  artifactName: "Kata-Desktop-${arch}.${ext}"
  maintainer: "Kata Contributors <hello@kata.sh>"
